name: host-ai-concierge

networks:
  host-ai-concierge_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
  dify_storage:
  n8n_data:
  evolution_instances:
  caddy_data:
  caddy_config:

services:
  # ---------- Shared infra ----------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: chatwoot,dify,n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-host-ai-concierge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [host-ai-concierge_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [host-ai-concierge_net]

  # ---------- Chatwoot ----------
  chatwoot-rails:
    image: chatwoot/chatwoot:v3.16.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: https://chatwoot.${BASE_DOMAIN}
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      ACTIVE_STORAGE_SERVICE: local
      ENABLE_ACCOUNT_SIGNUP: "false"
    entrypoint: docker/entrypoints/rails.sh
    command:
      - sh
      - -c
      - "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    volumes:
      - chatwoot_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks: [host-ai-concierge_net]

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v3.16.0
    restart: unless-stopped
    depends_on:
      - chatwoot-rails
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_storage:/app/storage
    networks: [host-ai-concierge_net]

  # ---------- Dify ----------
  dify-api:
    image: langgenius/dify-api:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      MODE: api
      DB_HOST: postgres
      DB_DATABASE: dify
      DB_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      CONSOLE_API_URL: https://dify.${BASE_DOMAIN}
      CONSOLE_WEB_URL: https://dify.${BASE_DOMAIN}
      SERVICE_API_URL: https://dify.${BASE_DOMAIN}
      APP_API_URL: https://dify.${BASE_DOMAIN}
      APP_WEB_URL: https://dify.${BASE_DOMAIN}
      WEB_API_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ORIGINS}
      CONSOLE_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ORIGINS}
    volumes:
      - dify_storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/console/api/setup >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [host-ai-concierge_net]

  dify-worker:
    image: langgenius/dify-api:latest
    restart: unless-stopped
    depends_on: [dify-api]
    env_file: .env
    environment:
      MODE: worker
      DB_HOST: postgres
      DB_DATABASE: dify
      DB_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${DIFY_SECRET_KEY}
    volumes:
      - dify_storage:/app/api/storage
    networks: [host-ai-concierge_net]

  dify-web:
    image: langgenius/dify-web:latest
    restart: unless-stopped
    depends_on: [dify-api]
    environment:
      CONSOLE_API_URL: https://dify.${BASE_DOMAIN}
      APP_API_URL: https://dify.${BASE_DOMAIN}
    networks: [host-ai-concierge_net]

  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
      GIN_MODE: release
    networks: [host-ai-concierge_net]

  # ---------- n8n ----------
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-host-ai-concierge}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: n8n.${BASE_DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${BASE_DOMAIN}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n-workflows:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [host-ai-concierge_net]

  # ---------- Evolution API (WhatsApp) ----------
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_URL: https://evo.${BASE_DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_TYPE: apikey
      DATABASE_PROVIDER: postgresql
      DATABASE_ENABLED: "false"
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-host-ai-concierge}:${POSTGRES_PASSWORD}@postgres:5432/postgres
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/2
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: https://n8n.${BASE_DOMAIN}/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [host-ai-concierge_net]

  # ---------- Reverse proxy + TLS ----------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [host-ai-concierge_net]
    depends_on:
      - chatwoot-rails
      - dify-api
      - dify-web
      - n8n
      - evolution
