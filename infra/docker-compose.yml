name: host-ai-concierge

networks:
  host-ai-concierge_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
  dify_storage:
  dify_plugin_storage:
  weaviate_data:
  n8n_data:
  evolution_instances:
  caddy_data:
  caddy_config:

services:
  # ---------- Shared infra ----------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: chatwoot,dify,dify_plugin,n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-host-ai-concierge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [host-ai-concierge_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [host-ai-concierge_net]

  # ---------- Chatwoot ----------
  chatwoot-rails:
    image: chatwoot/chatwoot:v3.16.0
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FRONTEND_URL: https://chatwoot.${BASE_DOMAIN}
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      ACTIVE_STORAGE_SERVICE: local
      ENABLE_ACCOUNT_SIGNUP: "false"
    entrypoint: docker/entrypoints/rails.sh
    command:
      - sh
      - -c
      - "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    volumes:
      - chatwoot_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks: [host-ai-concierge_net]

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v3.16.0
    restart: unless-stopped
    depends_on:
      - chatwoot-rails
    env_file: .env
    environment:
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: chatwoot
      POSTGRES_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    volumes:
      - chatwoot_storage:/app/storage
    networks: [host-ai-concierge_net]

  # ---------- Dify ----------
  dify-api:
    image: langgenius/dify-api:latest
    restart: unless-stopped
    # Roda como root para evitar PermissionDenied no volume dify_storage
    # (a imagem usa um UID interno que não bate com o owner do named volume).
    user: "0:0"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    env_file: .env
    environment:
      MODE: api
      STORAGE_LOCAL_PATH: /app/api/storage
      DB_HOST: postgres
      DB_DATABASE: dify
      DB_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      CONSOLE_API_URL: https://dify.${BASE_DOMAIN}
      CONSOLE_WEB_URL: https://dify.${BASE_DOMAIN}
      SERVICE_API_URL: https://dify.${BASE_DOMAIN}
      APP_API_URL: https://dify.${BASE_DOMAIN}
      APP_WEB_URL: https://dify.${BASE_DOMAIN}
      WEB_API_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ORIGINS}
      CONSOLE_CORS_ALLOW_ORIGINS: ${DIFY_CORS_ORIGINS}
      # Plugin daemon (necessário a partir do Dify 1.0)
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY:-lYkiYYRyG0qZQ5XkZl6jCNGKzPWAOVNm}
      PLUGIN_REMOTE_INSTALL_HOST: dify-plugin-daemon
      PLUGIN_REMOTE_INSTALL_PORT: 5003
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbRHAWlyrx7+RVDUw=}
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
      # Vector store (knowledge base RAG)
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
    # Boot fix-up:
    # 1. chown/chmod no volume dify_storage e em /home/dify (evita PermissionDenied
    #    ao gerar private.pem no setup do tenant inicial).
    # 2. flask db upgrade idempotente (cria tabelas no primeiro boot).
    # 3. Entra no entrypoint oficial.
    entrypoint:
      - sh
      - -c
      - "mkdir -p /app/api/storage /home/dify && chown -R 0:0 /app/api/storage /home/dify && chmod -R u+rwX /app/api/storage /home/dify && flask db upgrade && exec /entrypoint.sh"
    volumes:
      - dify_storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/console/api/setup >/dev/null 2>&1 || curl -fsS http://localhost:5001/console/api/setup >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [host-ai-concierge_net]

  dify-worker:
    image: langgenius/dify-api:latest
    restart: unless-stopped
    user: "0:0"
    depends_on: [dify-api]
    env_file: .env
    environment:
      MODE: worker
      DB_HOST: postgres
      DB_DATABASE: dify
      DB_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECRET_KEY: ${DIFY_SECRET_KEY}
      VECTOR_STORE: weaviate
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
    volumes:
      - dify_storage:/app/api/storage
    networks: [host-ai-concierge_net]

  dify-web:
    image: langgenius/dify-web:latest
    restart: unless-stopped
    depends_on: [dify-api]
    environment:
      CONSOLE_API_URL: https://dify.${BASE_DOMAIN}
      APP_API_URL: https://dify.${BASE_DOMAIN}
    networks: [host-ai-concierge_net]

  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SANDBOX_API_KEY}
      GIN_MODE: release
    networks: [host-ai-concierge_net]

  # Plugin daemon — obrigatório a partir do Dify 1.0
  # Sem isso, o console mostra "Failed to request plugin daemon".
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.0.6-local
    restart: unless-stopped
    user: "0:0"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-host-ai-concierge}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY:-lYkiYYRyG0qZQ5XkZl6jCNGKzPWAOVNm}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbRHAWlyrx7+RVDUw=}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "false"
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_PACKAGE_SIZE: 52428800
      PIP_MIRROR_URL: ""
      PLATFORM: local
      ROUTINE_POOL_SIZE: 10000
      LIFETIME_COLLECTION_HEARTBEAT_INTERVAL: 5
      LIFETIME_COLLECTION_GC_INTERVAL: 60
      LIFETIME_STATE_GC_INTERVAL: 300
      DIFY_PLUGIN_SERVER_PORT: 5002
    volumes:
      - dify_plugin_storage:/app/storage
    networks: [host-ai-concierge_net]

  # ---------- n8n ----------
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-host-ai-concierge}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: n8n.${BASE_DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.${BASE_DOMAIN}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n-workflows:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [host-ai-concierge_net]

  # ---------- Evolution API (WhatsApp) ----------
  evolution:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    environment:
      SERVER_URL: https://evo.${BASE_DOMAIN}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_TYPE: apikey
      DATABASE_PROVIDER: postgresql
      DATABASE_ENABLED: "false"
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-host-ai-concierge}:${POSTGRES_PASSWORD}@postgres:5432/postgres
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/2
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: https://n8n.${BASE_DOMAIN}/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [host-ai-concierge_net]

  # ---------- Reverse proxy + TLS ----------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [host-ai-concierge_net]
    depends_on:
      - chatwoot-rails
      - dify-api
      - dify-web
      - n8n
      - evolution
